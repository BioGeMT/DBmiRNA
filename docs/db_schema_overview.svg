<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960" role="img" aria-labelledby="title desc">
  <title id="title">DBmiRNA Database Schema</title>
  <desc id="desc">Schema figure showing miRNA metadata and gene metadata as anchors, with transcript-level, read and MRE-level, nucleotide-level, gene-level evidence, literature, and provenance collections between and around them.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 34px Arial, sans-serif; fill: #1f2933; }
      .subtitle { font: 400 17px Arial, sans-serif; fill: #52606d; }
      .group { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 12; ry: 12; }
      .anchorLeft { fill: #eef6ff; stroke: #5b8def; stroke-width: 2; rx: 12; ry: 12; }
      .anchorRight { fill: #f0fdf4; stroke: #45a557; stroke-width: 2; rx: 12; ry: 12; }
      .middle { fill: #fff7ed; stroke: #f59e0b; stroke-width: 2; rx: 12; ry: 12; }
      .evidence { fill: #f5f3ff; stroke: #8b5cf6; stroke-width: 2; rx: 12; ry: 12; }
      .support { fill: #f9fafb; stroke: #94a3b8; stroke-width: 2; rx: 12; ry: 12; }
      .nodeText { font: 700 19px Arial, sans-serif; fill: #1f2933; text-anchor: middle; dominant-baseline: middle; }
      .metaText { font: 400 14px Arial, sans-serif; fill: #475569; text-anchor: middle; }
      .groupText { font: 700 19px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #475569; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .arrowSoft { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrowSoft); }
      .dashed { stroke-dasharray: 8 7; }
      .label { font: 600 13px Arial, sans-serif; fill: #64748b; text-anchor: middle; }
    </style>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 11 3.5, 0 7" fill="#475569"/>
    </marker>
    <marker id="arrowSoft" markerWidth="11" markerHeight="11" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 11 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1600" height="960" class="bg"/>
  <text x="70" y="62" class="title">DBmiRNA Database Schema</text>
  <text x="70" y="92" class="subtitle">Gene and miRNA metadata anchor the model. Transcript, read/MRE, and nucleotide schemas preserve the biological context between them.</text>

  <rect x="45" y="150" width="285" height="250" class="group"/>
  <text x="70" y="185" class="groupText">miRNA Metadata Schema</text>
  <rect x="82" y="220" width="210" height="72" class="anchorLeft"/>
  <text x="187" y="256" class="nodeText">mirnas</text>
  <text x="187" y="325" class="metaText">name, accession, family, arm</text>
  <text x="187" y="348" class="metaText">sequence, aliases, source refs</text>

  <rect x="1270" y="150" width="285" height="250" class="group"/>
  <text x="1295" y="185" class="groupText">Gene Metadata Schema</text>
  <rect x="1308" y="220" width="210" height="72" class="anchorRight"/>
  <text x="1413" y="256" class="nodeText">genes</text>
  <text x="1413" y="325" class="metaText">symbol, accession, species</text>
  <text x="1413" y="348" class="metaText">aliases, normalization, source refs</text>

  <rect x="385" y="125" width="830" height="610" class="group"/>
  <text x="410" y="160" class="groupText">Interaction and Evidence Spine</text>

  <rect x="684" y="195" width="232" height="76" class="evidence"/>
  <text x="800" y="233" class="nodeText">mirna_gene_pairs</text>
  <text x="800" y="255" class="metaText">pair hub and support rollup</text>

  <rect x="430" y="310" width="230" height="185" class="group"/>
  <text x="455" y="342" class="groupText">Transcript-Level</text>
  <rect x="465" y="365" width="160" height="58" class="middle"/>
  <text x="545" y="394" class="nodeText">transcripts</text>
  <rect x="452" y="440" width="186" height="58" class="middle"/>
  <text x="545" y="462" class="nodeText">transcript</text>
  <text x="545" y="482" class="nodeText">feature tracks</text>

  <rect x="690" y="310" width="260" height="260" class="group"/>
  <text x="715" y="342" class="groupText">Read / MRE-Level</text>
  <rect x="728" y="365" width="184" height="58" class="middle"/>
  <text x="820" y="394" class="nodeText">site_observations</text>
  <rect x="715" y="448" width="210" height="58" class="middle"/>
  <text x="820" y="470" class="nodeText">site_transcript</text>
  <text x="820" y="490" class="nodeText">overlaps</text>
  <rect x="750" y="530" width="140" height="58" class="middle"/>
  <text x="820" y="559" class="nodeText">mre_sites</text>

  <rect x="980" y="310" width="190" height="185" class="group"/>
  <text x="1005" y="342" class="groupText">Nucleotide-Level</text>
  <rect x="1003" y="385" width="144" height="70" class="middle"/>
  <text x="1075" y="412" class="nodeText">nucleotide</text>
  <text x="1075" y="434" class="nodeText">profiles</text>

  <rect x="420" y="610" width="745" height="95" class="group"/>
  <text x="445" y="642" class="groupText">Gene-Level Evidence</text>
  <rect x="650" y="655" width="122" height="40" class="evidence"/>
  <text x="711" y="675" class="nodeText">experiments</text>
  <rect x="790" y="655" width="194" height="40" class="evidence"/>
  <text x="887" y="675" class="nodeText">experiment effects</text>
  <rect x="440" y="655" width="122" height="40" class="evidence"/>
  <text x="501" y="675" class="nodeText">predictors</text>
  <rect x="1000" y="655" width="145" height="40" class="evidence"/>
  <text x="1073" y="675" class="nodeText">predictor scores</text>

  <rect x="155" y="770" width="565" height="110" class="group"/>
  <text x="180" y="802" class="groupText">Literature Schema</text>
  <rect x="190" y="825" width="155" height="42" class="support"/>
  <text x="268" y="846" class="nodeText">documents</text>
  <rect x="370" y="825" width="145" height="42" class="support"/>
  <text x="443" y="846" class="nodeText">mentions</text>
  <rect x="540" y="825" width="145" height="42" class="support"/>
  <text x="613" y="846" class="nodeText">assertions</text>

  <rect x="890" y="770" width="360" height="110" class="group"/>
  <text x="915" y="802" class="groupText">Provenance Schema</text>
  <rect x="985" y="825" width="170" height="42" class="support"/>
  <text x="1070" y="846" class="nodeText">ingestion_runs</text>

  <path d="M292 256 C410 256, 520 233, 684 233" class="arrow"/>
  <path d="M1308 256 C1190 256, 1080 233, 916 233" class="arrow"/>
  <path d="M1413 292 C1413 405, 1260 394, 625 394" class="arrowSoft"/>
  <path d="M545 423 L545 440" class="arrowSoft"/>
  <path d="M545 394 C615 394, 660 394, 728 394" class="arrowSoft"/>
  <path d="M820 423 L820 448" class="arrowSoft"/>
  <path d="M820 506 L820 530" class="arrowSoft"/>
  <path d="M800 271 C800 340, 800 445, 800 530" class="arrow"/>
  <path d="M890 559 C970 559, 1005 495, 1055 455" class="arrowSoft"/>
  <path d="M820 588 C855 625, 856 655, 887 655" class="arrowSoft"/>
  <path d="M912 394 C950 394, 975 405, 1003 420" class="arrowSoft"/>
  <path d="M625 394 C780 360, 940 365, 1050 385" class="arrowSoft"/>
  <path d="M711 655 L790 675" class="arrowSoft"/>
  <path d="M562 675 L1000 675" class="arrowSoft"/>
  <path d="M887 655 C870 530, 845 360, 800 271" class="arrowSoft"/>
  <path d="M1073 655 C990 530, 910 360, 800 271" class="arrowSoft"/>
  <path d="M345 846 L370 846" class="arrowSoft"/>
  <path d="M515 846 L540 846" class="arrowSoft"/>
  <path d="M613 825 C610 665, 600 420, 292 292" class="arrowSoft"/>
  <path d="M685 846 C865 735, 1135 430, 1308 292" class="arrowSoft"/>
  <path d="M1070 825 C1070 760, 1080 720, 1073 695" class="arrowSoft dashed"/>
  <path d="M1070 825 C955 760, 840 715, 820 588" class="arrowSoft dashed"/>
  <path d="M1070 825 C850 790, 665 730, 545 498" class="arrowSoft dashed"/>

  <text x="487" y="239" class="label">miRNA anchor</text>
  <text x="1110" y="239" class="label">gene anchor</text>
  <text x="1260" y="390" class="label">gene to transcripts</text>
  <text x="1050" y="745" class="label">run provenance</text>
</svg>
